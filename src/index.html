<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalChat — Talk to Your Local AI</title>
  <meta name="description" content="A beautiful ChatGPT-like interface for local LLMs powered by Ollama. Private, fast, offline." />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="logo-text">LocalChat</span>
        </div>
        <button class="btn-icon" id="btn-new-chat" title="New Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-search">
        <input type="text" id="search-conversations" placeholder="Search chats..." />
      </div>

      <div class="sidebar-conversations" id="conversation-list">
        <!-- Conversation items rendered by JS -->
      </div>

      <div class="sidebar-footer">
        <button class="sidebar-footer-btn" id="btn-settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Settings</span>
        </button>
        <button class="sidebar-footer-btn" id="btn-theme-toggle" title="Toggle Theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <span>Theme</span>
        </button>
      </div>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main chat area -->
    <main class="main" id="main">
      <!-- Top bar -->
      <header class="topbar" id="topbar">
        <button class="btn-icon mobile-menu" id="btn-menu" title="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="model-selector">
          <label for="model-select">Model</label>
          <select id="model-select">
            <option value="">Loading models...</option>
          </select>
        </div>

        <div class="topbar-actions">
          <button class="btn-icon" id="btn-export" title="Export Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages area -->
      <div class="messages-container" id="messages-container">
        <div class="messages" id="messages">
          <!-- Welcome screen shown when no messages -->
          <div class="welcome" id="welcome">
            <div class="welcome-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <h1>Welcome to LocalChat</h1>
            <p>Your private, local AI assistant. Select a model above and start chatting.</p>
            <div class="welcome-hints">
              <button class="hint-card" data-hint="Explain quantum computing in simple terms">
                <span class="hint-icon">💡</span>
                <span>Explain quantum computing</span>
              </button>
              <button class="hint-card" data-hint="Write a Python function to sort a list using merge sort">
                <span class="hint-icon">💻</span>
                <span>Write a sorting algorithm</span>
              </button>
              <button class="hint-card" data-hint="What are the pros and cons of microservices architecture?">
                <span class="hint-icon">🏗️</span>
                <span>Compare architectures</span>
              </button>
              <button class="hint-card" data-hint="Help me write a professional email to decline a meeting">
                <span class="hint-icon">✉️</span>
                <span>Draft a professional email</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area" id="input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            placeholder="Type a message..."
            rows="1"
            autofocus
          ></textarea>
          <button class="btn-send" id="btn-send" title="Send message" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
          <button class="btn-stop" id="btn-stop" title="Stop generating" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="token-info" id="token-info"></span>
          <span class="input-hint">Press Enter to send, Shift+Enter for new line</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="btn-icon" id="btn-close-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="settings-ollama-url">Ollama URL</label>
          <input type="text" id="settings-ollama-url" value="http://localhost:11434" />
          <span class="form-hint">The address where Ollama is running</span>
        </div>
        <div class="form-group">
          <label for="settings-default-model">Default Model</label>
          <select id="settings-default-model">
            <option value="">None</option>
          </select>
        </div>
        <div class="form-group">
          <label for="settings-system-prompt">System Prompt (optional)</label>
          <textarea id="settings-system-prompt" rows="3" placeholder="e.g. You are a helpful coding assistant..."></textarea>
          <span class="form-hint">Instructions that are sent at the start of every conversation</span>
        </div>
        <div class="form-group">
          <button class="btn-secondary" id="btn-test-connection">Test Connection</button>
          <span class="connection-status" id="connection-status"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-settings">Cancel</button>
        <button class="btn-primary" id="btn-save-settings">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div class="modal-overlay" id="export-modal" style="display:none">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Export Conversation</h2>
        <button class="btn-icon" id="btn-close-export">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <button class="export-option" id="btn-export-txt">
          <span class="export-icon">📄</span>
          <div>
            <strong>Plain Text (.txt)</strong>
            <span>Simple text format, easy to read</span>
          </div>
        </button>
        <button class="export-option" id="btn-export-json">
          <span class="export-icon">📋</span>
          <div>
            <strong>JSON (.json)</strong>
            <span>Structured data, good for importing</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Context menu for conversations -->
  <div class="context-menu" id="context-menu" style="display:none">
    <button class="context-menu-item" id="ctx-rename">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
      Rename
    </button>
    <button class="context-menu-item ctx-danger" id="ctx-delete">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete
    </button>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
